# ══════════════════════════════════════════════════════════════════════════════
# GITHUB ACTIONS
# ══════════════════════════════════════════════════════════════════════════════
name: Club Email Digest

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .email_agent_state.json
          key: email-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: email-state-${{ runner.os }}

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          CLUB_GMAIL_ADDRESS:      ${{ secrets.CLUB_GMAIL_ADDRESS }}
          CLUB_GMAIL_APP_PASSWORD: ${{ secrets.CLUB_GMAIL_APP_PASSWORD }}
          DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run club_email_digest.py

      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: .email_agent_state.json
          key: email-state-${{ runner.os }}-${{ github.run_id }}
